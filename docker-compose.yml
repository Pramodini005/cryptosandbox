version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - APP_NAME=Cryptography Learning Sandbox
      - DEBUG=True
      - DATABASE_URL=sqlite+aiosqlite:///./crypto_sandbox.db
      - BACKEND_CORS_ORIGINS=["http://localhost:3000", "http://localhost:80", "http://frontend:3000", "http://127.0.0.1:3000"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
